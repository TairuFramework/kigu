name: Android E2E
on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory of the Expo e2e test app'
        type: string
        required: false
        default: tests/e2e-expo
      node-version:
        type: string
        required: false
        default: '24'

permissions:
  contents: read

concurrency:
  # github.workflow resolves to the caller's name; include this reusable
  # workflow's identity so sibling reusable calls in one caller don't collide.
  group: ${{ github.workflow }}-e2e-android-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DO_NOT_TRACK: 1
  MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED: true
  MAESTRO_CLI_NO_ANALYTICS: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          if [ -e /dev/kvm ]; then
            sudo mkdir -p /etc/udev/rules.d
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
            sudo usermod -a -G kvm "$USER"
          else
            echo "KVM not available, continuing without hardware acceleration"
          fi

      - name: Setup environment
        uses: TairuFramework/kigu/setup@main
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles(format('{0}/android/**/*.gradle*', inputs.working-directory), format('{0}/android/gradle/wrapper/gradle-wrapper.properties', inputs.working-directory), format('{0}/package.json', inputs.working-directory)) }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android system image
        uses: actions/cache@v6
        with:
          # ANDROID_HOME on ubuntu runners; runner-injected vars aren't in the
          # env expression context, so the path is hardcoded.
          path: /usr/local/lib/android/sdk/system-images/android-36
          key: sysimg-android-36-google_apis-x86_64

      - name: Install Maestro
        shell: bash
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Create and boot emulator
        run: |
          export ANDROID_AVD_HOME=$HOME/.config/.android/avd
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo y | sdkmanager "system-images;android-36;google_apis;x86_64"
          echo no | avdmanager create avd --force -n test-emulator --abi 'google_apis/x86_64' --package 'system-images;android-36;google_apis;x86_64'
          "$ANDROID_HOME/emulator/emulator" -avd test-emulator -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -memory 4096 -no-snapshot-save &
          adb wait-for-device
          # shellcheck disable=SC2016 # $(...) is expanded by the inner `bash -c`, not the outer shell
          timeout 300 bash -c 'while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" != "1" ]; do sleep 5; done'
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Build Android app
        working-directory: ${{ inputs.working-directory }}
        # Enable the Gradle build cache via -D (android/gradle.properties is
        # generated by expo prebuild, so it isn't edited). The local cache lives
        # in ~/.gradle/caches, already persisted by the Cache Gradle step.
        env:
          GRADLE_OPTS: -Dorg.gradle.caching=true
        run: pnpm run android:release

      - name: Run Maestro tests
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run test

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-screenshots
          path: ${{ inputs.working-directory }}/*.png
