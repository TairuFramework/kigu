name: iOS E2E
on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory of the Expo e2e test app'
        type: string
        required: false
        default: tests/e2e-expo
      runs-on:
        description: 'Runner label for the macOS job'
        type: string
        required: false
        default: macos-26
      node-version:
        type: string
        required: false
        default: '24'

permissions:
  contents: read

concurrency:
  # github.workflow resolves to the caller's name; include this reusable
  # workflow's identity so sibling reusable calls in one caller don't collide.
  group: ${{ github.workflow }}-e2e-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DO_NOT_TRACK: 1
  MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED: true
  MAESTRO_CLI_NO_ANALYTICS: true

jobs:
  test:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: TairuFramework/kigu/setup@main
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache CocoaPods
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ${{ inputs.working-directory }}/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles(format('{0}/ios/Podfile.lock', inputs.working-directory)) }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Cache Xcode DerivedData
        uses: actions/cache@v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles(format('{0}/ios/Podfile.lock', inputs.working-directory)) }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Install ccache
        run: brew install ccache

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles(format('{0}/ios/Podfile.lock', inputs.working-directory)) }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Install Maestro
        shell: bash
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build iOS app
        working-directory: ${{ inputs.working-directory }}
        # USE_CCACHE=1 makes React Native's Podfile post_install wire the
        # ccache-clang wrapper as CC/CXX. Must be set during pod install (run by
        # expo run:ios), so the setting bakes into the cached Pods project.
        env:
          USE_CCACHE: '1'
          CCACHE_MAXSIZE: 2G
          CCACHE_COMPILERCHECK: content
          CCACHE_SLOPPINESS: clang_index_store,include_file_ctime,include_file_mtime,time_macros
        run: |
          # ccache does not expand ~, so resolve CCACHE_DIR against $HOME here.
          export CCACHE_DIR="$HOME/Library/Caches/ccache"
          ccache --zero-stats
          pnpm run ios:release
          ccache --show-stats

      - name: Run Maestro tests
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run test

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-screenshots
          path: ${{ inputs.working-directory }}/*.png
