name: Desktop E2E
on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory of the desktop e2e test app'
        type: string
        required: false
        default: tests/e2e-electron
      os:
        description: 'JSON array of runner OSes'
        type: string
        required: false
        default: '["macos-latest", "windows-latest"]'
      node-version:
        type: string
        required: false
        default: '24'

permissions:
  contents: read

concurrency:
  # github.workflow resolves to the caller's name; include this reusable
  # workflow's identity so sibling reusable calls in one caller don't collide.
  group: ${{ github.workflow }}-e2e-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DO_NOT_TRACK: 1

jobs:
  test:
    name: on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: TairuFramework/kigu/setup@main
        with:
          node-version: ${{ inputs.node-version }}

      - name: Resolve electron version
        id: electron
        shell: bash
        run: echo "version=$(node -p "require('electron/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache electron binary
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          # Key on the electron version, not the lockfile: the cached binary only
          # varies by version, so unrelated dep bumps must not evict it. No
          # restore-keys — a partial match would restore a wrong-version binary.
          key: electron-${{ runner.os }}-${{ steps.electron.outputs.version }}

      - name: Fetch electron binary
        # allowBuilds.electron:false blocks electron's install script, so extract
        # dist/ explicitly here (pnpm rebuild electron would be a no-op).
        run: node node_modules/electron/install.js

      - name: Package app
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run package

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: ${{ inputs.working-directory }}/playwright-report/

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-${{ matrix.os }}
          path: ${{ inputs.working-directory }}/test-results/
