name: Desktop E2E
on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory of the desktop e2e test app'
        type: string
        required: false
        default: tests/e2e-electron
      os:
        description: 'JSON array of runner OSes'
        type: string
        required: false
        default: '["macos-latest", "windows-latest"]'
      node-version:
        type: string
        required: false
        default: '24'

env:
  CI: true
  DO_NOT_TRACK: 1

jobs:
  test:
    name: on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./setup
        with:
          node-version: ${{ inputs.node-version }}

      - name: Package app
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run package

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: ${{ inputs.working-directory }}/playwright-report/

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.os }}
          path: ${{ inputs.working-directory }}/test-results/

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.os }}
          path: ${{ inputs.working-directory }}/screenshots/
