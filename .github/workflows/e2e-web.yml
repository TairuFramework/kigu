name: Web E2E
on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory of the web e2e test app'
        type: string
        required: false
        default: tests/e2e-web
      node-version:
        type: string
        required: false
        default: '24'

permissions:
  contents: read

concurrency:
  # github.workflow resolves to the caller's name; include this reusable
  # workflow's identity so sibling reusable calls in one caller don't collide.
  group: ${{ github.workflow }}-e2e-web-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DO_NOT_TRACK: 1

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: TairuFramework/kigu/setup@main
        with:
          node-version: ${{ inputs.node-version }}

      - name: Resolve Playwright version
        id: playwright
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          # Key on the Playwright version, not the lockfile: browsers only vary by
          # version, so unrelated dep bumps must not evict them. No restore-keys —
          # a partial match would restore browsers for the wrong version.
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright browsers
        working-directory: ${{ inputs.working-directory }}
        run: pnpm exec playwright install --with-deps

      - name: Build app
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run build

      - name: Run Playwright tests
        working-directory: ${{ inputs.working-directory }}
        run: pnpm run test

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ${{ inputs.working-directory }}/playwright-report/
          retention-days: 30
