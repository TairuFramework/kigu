# setup/action.yml
name: Setup
description: Shared environment setup (pnpm + node + install + build)
inputs:
  node-version:
    description: 'Node version to use'
    required: false
    default: '24'
  build:
    description: 'Whether to run pnpm run build'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Cache turbo
      if: ${{ inputs.build == 'true' }}
      uses: actions/cache@v6
      with:
        # Loose key + restore-keys is safe: turbo re-validates entries by content
        # hash, so a stale restore just misses instead of serving wrong output.
        path: .turbo
        key: turbo-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-

    - name: Build packages
      if: ${{ inputs.build == 'true' }}
      shell: bash
      run: pnpm run build
